# Kimi Code CLI — project-local configuration
# ─────────────────────────────────────────────────────────────────────────────
# This file is committed to source control.
# It contains NO secrets — the API key is read from the KIMI_API_KEY env var.
#
# kimi-cli uses the first config it finds:
#   1. --config-file <path> CLI flag
#   2. ~/.kimi/config.toml  (user-global, written by .devcontainer/setup.sh)
#
# To use this project-local config directly:
#   kimi --config-file .kimi/config.toml
# ─────────────────────────────────────────────────────────────────────────────

default_model = "kimi-for-coding"

[providers.kimi]
type     = "kimi"
base_url = "https://api.moonshot.cn/v1"
# api_key is resolved from the KIMI_API_KEY environment variable at runtime.
# Set it in .env (never commit .env) or via Codespace secrets.
api_key  = "REPLACED_BY_ENV_VAR"

[models.kimi-for-coding]
provider         = "kimi"
model            = "kimi-k2-5"
max_context_size = 131072

[loop_control]
# Maximum tool-call steps the agent may take in a single turn.
max_steps_per_turn   = 100
# Retries per failed step before aborting.
max_retries_per_step = 3
# Extra Ralph-mode iterations (0 = disabled, -1 = unlimited).
max_ralph_iterations = 0

[services]
