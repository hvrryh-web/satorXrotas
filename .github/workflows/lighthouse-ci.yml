name: Lighthouse CI

# PRX-25-PERF-02 — runs Lighthouse against a local `vite preview` build of
# apps/web for every PR + push-to-main. Asserts perf / a11y / best-practices /
# SEO targets per the Phase-1 exit criteria. Currently set to `warn` so a
# regression doesn't immediately fail CI; tighten to `error` once the
# baseline is established in 3+ consecutive green runs (per the runbook).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse audits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build webapp
        run: pnpm --filter @njz-os/web build

      - name: Install @lhci/cli
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: lhci autorun --config=./lighthouserc.json
        continue-on-error: true

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lhci-report
          path: ./lhci-report
          retention-days: 30
