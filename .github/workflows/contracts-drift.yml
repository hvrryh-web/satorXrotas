name: Contracts drift

# Detects drift between RAT-OS's vendored copy of upstream contracts
# (currently contracts/openapi/agent-gateway.yaml per ADR-0014) and the
# upstream source on notbleaux/ZeSporteXte.
#
# On non-empty diff, opens a `contracts-drift` issue with the diff in the
# body. Non-blocking — drift is informational; the human decides whether
# to bump the pin.
#
# Runs weekly (Friday 09:00 UTC) and on manual dispatch.

on:
  schedule:
    - cron: '0 9 * * 5'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  agent-gateway-drift:
    name: agent-gateway openapi.json drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python (for PyYAML)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Refresh-in-place against latest upstream
        id: refresh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          node tools/contracts/refresh-agent-gateway.mjs
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Capture diff if changed
        if: steps.refresh.outputs.exit_code == '1'
        id: diff
        run: |
          {
            echo 'diff<<EOF'
            git --no-pager diff -- contracts/openapi/agent-gateway.yaml | head -300
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Open / update drift issue
        if: steps.refresh.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const diff = `${{ steps.diff.outputs.diff }}`;
            const title = '[contracts-drift] agent-gateway openapi.json drifted from upstream';
            const body = [
              'Weekly drift check detected changes in upstream',
              '`notbleaux/ZeSporteXte/services/agent-gateway/openapi.json`',
              'vs the vendored copy at',
              '`contracts/openapi/agent-gateway.yaml`.',
              '',
              'Per ADR-0014, drift is **informational only** — no auto-merge.',
              'Review the diff below; if the upstream change is desirable,',
              'bump the pinned SHA via',
              '`pnpm contracts:refresh-agent-gateway` and open a PR.',
              '',
              '```diff',
              diff.slice(0, 60000),
              '```',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'contracts-drift',
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: 'Drift still present as of this scheduled check.\n\n' + body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['contracts-drift', 'documentation'],
              });
            }

      - name: No drift
        if: steps.refresh.outputs.exit_code == '0'
        run: echo 'No drift — vendored agent-gateway.yaml is current.'
