# Lineage map: where does each canonical concept come from?
# Used by agents to trace "why does this exist?" without spelunking history.

concepts:
  - name: NJZ RAT-OS
    type: brand
    origin: User direction (2026-05-24)
    relates_to:
      - njz-os (technical platform name)
      - satorXrotas (repository name)

  - name: NJZ-OS
    type: platform
    origin: 3NJZOS_PRD.docx (uploaded 2026-05-24)
    description: Neural Operating System — wellness-productivity OS, 7 modules + PolyCo.World

  - name: PolyCo.World
    type: feature
    origin: 3NJZOS_PRD.docx §1.2
    description: Pixel-art isometric metaverse, Office + Home modules, unifies progression
    parent: NJZ-OS

  - name: NJZPOF v0.2
    type: framework
    origin: notbleaux/ZeSporteXte (`.doc-tiers.json`)
    description: NJZ Platform Operations Framework — doc tiering, agent coordination

  - name: TENET / GameNodeID / Quarter GRID
    type: architecture
    origin: notbleaux/ZeSporteXte (CLAUDE.md, docs/architecture/TENET_TOPOLOGY.md)
    status: out-of-scope-for-RAT-OS
    note: TENET belongs to the eSports platform; RAT-OS does not implement it

  - name: legacy/satire-deck-veritas
    type: branch
    origin: Pre-2026-05-24 contents of hvrryh-web/satorXrotas
    description: Archive of the prior Satire-deck-Veritas restructure; immutable

  - name: '@njz/*'
    type: package-scope
    origin: notbleaux/ZeSporteXte (packages/@njz/)
    description: Shared NJZ-wide packages (ui, etc.); RAT-OS consumes via npm

  - name: '@njz-os/*'
    type: package-scope
    origin: hvrryh-web/satorXrotas (this repo)
    description: RAT-OS-specific packages (focus-engine, audio-engine, polyworld, etc.)

