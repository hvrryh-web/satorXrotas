version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rat-os-postgres
    environment:
      POSTGRES_USER: ratos
      POSTGRES_PASSWORD: ratos
      POSTGRES_DB: ratos_dev
    ports:
      - '5432:5432'
    volumes:
      - rat-os-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ratos']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rat-os-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rat-os-pg:
